version: '3.9'

services:
  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    volumes:
      - ./frontend/src:/app/src
    environment:
      - VITE_API_URL=http://localhost:4000
      - VITE_REMOTION_URL=http://localhost:3002
    depends_on:
      - backend
    deploy:
      resources:
        limits:
          memory: 512M

  backend:
    build: ./backend
    ports:
      - "4000:4000"
    volumes:
      - ./backend/src:/app/src
      - ./backend/prisma:/app/prisma
      - ./storage:/app/storage
      - ./storage/audio:/app/storage/audio
      - ./storage/bgm:/app/storage/bgm
      - ./storage/config:/app/storage/config
      - ./service-account.json:/app/service-account.json:ro
      - /Users/david/Documents/my-video-project/my-video/public:/app/remotion-project/public
      - /Users/david/Documents/my-video-project/my-video/src:/app/remotion-project/src
      - ./backend/data:/app/data
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 1G

  postgres:
    image: pgvector/pgvector:pg15
    environment:
      POSTGRES_DB: hbas_db
      POSTGRES_USER: hbas
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hbas"]
      interval: 5s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 256M

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 128M

  remotion:
    build:
      context: /Users/david/Documents/my-video-project/my-video
      dockerfile: Dockerfile
    volumes:
      # 소스 코드만 마운트 (node_modules는 이미지에 유지 — Chrome 포함)
      - /Users/david/Documents/my-video-project/my-video/src:/app/src
      - /Users/david/Documents/my-video-project/my-video/public:/app/public
      - /Users/david/Documents/my-video-project/my-video/render-server.mjs:/app/render-server.mjs
      - /Users/david/Documents/my-video-project/my-video/remotion.config.ts:/app/remotion.config.ts
      - /Users/david/Documents/my-video-project/my-video/tsconfig.json:/app/tsconfig.json
    ports:
      - "3002:3002"
      - "3003:3003"
    environment:
      - NODE_ENV=development
    deploy:
      resources:
        limits:
          memory: 3G

volumes:
  postgres_data:
