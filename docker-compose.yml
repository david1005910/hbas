version: '3.9'

services:
  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    volumes:
      - ./frontend/src:/app/src
    environment:
      - VITE_API_URL=http://localhost:4000
    depends_on:
      - backend
    deploy:
      resources:
        limits:
          memory: 512M

  backend:
    build: ./backend
    ports:
      - "4000:4000"
    volumes:
      - ./backend/src:/app/src
      - ./backend/prisma:/app/prisma
      - ./storage:/app/storage
      - ./storage/audio:/app/storage/audio
      - ./storage/bgm:/app/storage/bgm
      - ./service-account.json:/app/service-account.json:ro
      - /Users/david/Documents/my-video-project/my-video:/app/remotion-project
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 1G

  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: hbas_db
      POSTGRES_USER: hbas
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hbas"]
      interval: 5s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 256M

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 128M

  remotion:
    image: node:20-alpine
    working_dir: /app
    volumes:
      - /Users/david/Documents/my-video-project/my-video:/app
    ports:
      - "3002:3002"
    command: sh -c "npm install && npx remotion studio --port 3002"
    environment:
      - NODE_ENV=development
    deploy:
      resources:
        limits:
          memory: 1G

volumes:
  postgres_data:
